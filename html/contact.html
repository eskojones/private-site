<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Private Site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="40" height="40" rx="8" fill="#ff5500"/>
                    <path d="M10 20L20 10L30 20L20 30L10 20Z" fill="white"/>
                </svg>
                <span>Brand</span>
            </div>
            <ul class="nav-links">
                <li id="home-link"><a href="index.html">Home</a></li>
                <li id="features-link"><a href="features.html">Features</a></li>
                <li id="about-link"><a href="about.html">About</a></li>
                <li id="contact-link"><a href="contact.html">Contact</a></li>
                <li id="auth-li"><a href="#" id="auth-link">Login / Signup</a></li>
            </ul>
            <div class="menu-container">
                <button id="menu-button" aria-haspopup="true" aria-expanded="false" aria-label="Toggle menu">
                    <div class="hamburger">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Contact Us</h1>
            <p>Have questions? Reach out to us at support@privatesite.com.</p>
        </section>
    </main>

    <div id="auth-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="login-form-container">
                <h2>Login</h2>
                <form id="login-form">
                    <input type="text" id="login-username" placeholder="Username" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <div id="login-error" class="error-message hidden"></div>
                    <button type="submit" class="cta-button">Login</button>
                    <p>Don't have an account? <a href="#" id="show-signup">Signup</a></p>
                </form>
            </div>
            <div id="signup-form-container" class="hidden">
                <h2>Signup</h2>
                <form id="signup-form">
                    <input type="text" id="signup-username" placeholder="Username" required>
                    <input type="password" id="signup-password" placeholder="Password" required>
                    <div id="signup-error" class="error-message hidden"></div>
                    <button type="submit" class="cta-button">Signup</button>
                    <p>Already have an account? <a href="#" id="show-login">Login</a></p>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
